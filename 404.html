<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Pierre Chambet</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text x='50' y='70' font-size='60' text-anchor='middle' fill='%235eead4' font-family='system-ui'>P</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .wrapper { max-width: 420px; padding: 24px; }
        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 6rem;
            font-weight: 700;
            color: #5eead4;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 12px; }
        p { font-size: 0.92rem; color: #94a3b8; line-height: 1.6; margin-bottom: 32px; }
        a {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #0f172a;
            background: #5eead4;
            padding: 10px 28px;
            border-radius: 6px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">Back to portfolio</a>
    </div>
</body>
</html>
